name: Build and push image

# Builds happen here, on GitHub's runners, instead of on the production VM -
# that's the whole point (see the "build takes forever on my Oracle VM" issue
# this was set up to solve). The VM only ever pulls a finished image.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}   # lets you trigger a rebuild manually from the Actions tab

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # -> ghcr.io/ckmysuru-hub/ckm-cams

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io using the built-in token
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # Oracle's "Always Free" tier offers both an AMD (x86_64) and an
          # Ampere (arm64) shape - building both means the image runs either
          # way without you having to remember which one you're on. Drop
          # whichever you don't need to speed this job up.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REACT_APP_BACKEND_URL=

  # Optional: automatically deploy to the VM after a successful push.
  # Only runs if you've added the secrets below in
  # Settings -> Secrets and variables -> Actions. If they're not set, this
  # job is skipped rather than failing the workflow.
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && vars.ENABLE_AUTO_DEPLOY == 'true'
    steps:
      - name: Pull and restart on the VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f

